services:
  - type: web
    name: health-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: DIFY_API_KEY
        sync: false
      - key: DIFY_API_BASE_URL
        value: https://api.dify.ai/v1
